[General]
cmdenv-express-mode     = true
cmdenv-autoflush        = true
cmdenv-status-frequency = 1s
**.cmdenv-log-level     = info

image-path       = ../../images
network          = EmergencyLaneScenario
debug-on-errors  = true
print-undisposed = true
sim-time-limit   = 300s

**.scalar-recording = true
**.vector-recording = true

repeat   = 5
seed-set = ${repetition}

*.playgroundSizeX = 3000m
*.playgroundSizeY = 3000m
*.playgroundSizeZ = 50m

*.annotations.draw           = true
*.manager.updateInterval     = 0.4s
*.manager.host               = "localhost"
*.manager.port               = 9999
*.manager.autoShutdown       = true
*.manager.launchConfig       = xmldoc("realworld.launchd.xml")
*.manager.moduleType         = "org.car2x.veins.nodes.Car"
*.manager.moduleName         = "node"

*.connectionManager.sendDirect       = true
*.connectionManager.pMax             = 20mW
*.connectionManager.sat              = -89dBm
*.connectionManager.alpha            = 2.0
*.connectionManager.carrierFrequency = 5.9e9Hz
*.connectionManager.maxInterfDist    = 500m

*.**.nic.mac1609_4.useServiceChannel   = false
*.**.nic.mac1609_4.txPower             = 20mW
*.**.nic.mac1609_4.bitrate             = 6Mbps
*.**.nic.phy80211p.minPowerLevel       = -110dBm
*.**.nic.phy80211p.useNoiseFloor       = true
*.**.nic.phy80211p.noiseFloor          = -98dBm
*.**.nic.phy80211p.decider             = xmldoc("config.xml")
*.**.nic.phy80211p.analogueModels      = xmldoc("config.xml")
*.**.nic.phy80211p.usePropagationDelay = true
*.**.nic.phy80211p.antenna             = xmldoc("antenna.xml", "/root/Antenna[@id='monopole']")

*.node[*].applType            = "MyVeinsApp"
*.node[*].appl.headerLength   = 80 bit
*.node[*].appl.sendBeacons    = true
*.node[*].appl.dataOnSch      = true
*.node[*].appl.beaconInterval = 1s

*.numRsu              = 1
*.rsu[0].applType     = "RSUApp"
*.rsu[0].mobility.x   = 467
*.rsu[0].mobility.y   = 442
*.rsu[0].mobility.z   = 5
*.rsu[*].nic.phy80211p.antennaOffsetZ = 5 m
*.rsu[*].nic.phy80211p.sensitivity    = -89dBm

*.node[*].veinsmobility.x            = 0
*.node[*].veinsmobility.y            = 0
*.node[*].veinsmobility.z            = 0
*.node[*].veinsmobility.setHostSpeed = false

*.node[*].appl.operationMode        = 0
*.node[*].appl.isMalicious          = false
*.node[*].appl.attackProbability    = 0.0
*.node[*].appl.baseToll             = 2.50
*.node[*].appl.hardwareLatency      = 0.005
*.node[*].appl.driverReactionJitter = 0.15

[Config Proposed_V2X]
description = "V2X Preemption and Dynamic Tolling (Proposed)"
*.node[*].appl.operationMode    = 0
*.node[*].appl.isMalicious      = false
*.node[*].appl.hardwareLatency  = 0.005

[Config Baseline_SirenOnly]
description = "Traditional Siren-Only Method (Baseline)"
*.node[*].appl.operationMode    = 1
*.node[*].appl.isMalicious      = false
*.node[*].appl.hardwareLatency  = 0.0

[Config Security_Attack]
description = "Security Resilience Test (PSID Spoofing)"
extends     = Proposed_V2X
*.node[10..15].appl.isMalicious       = true
*.node[10..15].appl.attackProbability = 0.5